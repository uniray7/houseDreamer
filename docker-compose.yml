services:
  postgres:
    image: postgres:16-alpine
    container_name: housedreamer-postgres
    environment:
      POSTGRES_USER: housedreamer
      POSTGRES_PASSWORD: housedreamer
      POSTGRES_DB: housedreamer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U housedreamer -d housedreamer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
